<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raduga Note - Pro</title>
    <style>
        :root { --line-color: #000; --text-main: #1a1a1a; --text-muted: #555; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        @page { size: A4; margin: 0; }

        body { 
            background: #f1f5f9; 
            margin: 0; padding: 20px 0; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
        }

        .page {
            background: white;
            width: 210mm;
            min-height: 296mm;
            padding: 20mm 20mm;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        header { 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 2.5px solid var(--line-color);
            padding-bottom: 10px;
        }
        h1 { margin: 0; font-size: 22pt; font-weight: 900; letter-spacing: 0.5px; }
        .date-box { font-size: 11pt; font-weight: bold; }

        .info-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; margin-bottom: 25px; }
        .info-item { display: flex; flex-direction: column; }
        label { font-size: 8.5pt; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; color: var(--text-muted); }
        .input-field { border: none; font-size: 12pt; padding: 8px 0; outline: none; border-bottom: 1px solid #ddd; background: transparent; width: 100%; }

        /* ITEM LIST Section */
        .item-section { margin-top: 15px; flex-grow: 1; }
        .section-title { font-size: 10pt; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; color: var(--text-main); }
        
        .item-header { 
            display: grid; grid-template-columns: 1fr 1fr; 
            font-weight: 800; font-size: 9pt; padding: 10px 5px; 
            background: #fcfcfc; border-top: 1.5px solid var(--line-color); border-bottom: 1px solid var(--line-color);
        }
        .item-row { 
            display: grid; grid-template-columns: 1fr 1fr; 
            padding: 0; border-bottom: 1px solid #f0f0f0;
            align-items: stretch;
        }
        
        .item-row textarea { 
            border: none; 
            outline: none; 
            font-size: 11pt; 
            background: transparent; 
            width: 100%; 
            padding: 12px 10px;
            font-family: inherit; 
            resize: none; 
            overflow: hidden;
            word-break: break-all;
            display: block;
        }

        /* Bottom Section */
        .bottom-container { margin-top: 50px; }
        .remark-section { margin-bottom: 60px; }
        .remark-area { width: 100%; min-height: 80px; border: none; border-bottom: 1.5px solid var(--line-color); font-size: 11pt; padding: 40px 0 10px 0; outline: none; resize: none; background: transparent; display: block; }

        /* Signature Space */
        .signature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .sig-box { text-align: left; }
        .sig-space { height: 80px; border-bottom: 2px solid var(--line-color); margin-bottom: 10px; }
        .sig-label { font-size: 10pt; font-weight: 800; text-transform: uppercase; }

        /* Control Buttons */
        .controls { width: 210mm; margin-bottom: 15px; display: flex; gap: 10px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-mode { background: #475569; color: white; }
        .btn-mode.active { background: #000; }
        .btn-print { background: #2563eb; color: white; flex: 2; }
        .btn-add { background: #fff; color: #64748b; font-size: 9pt; margin-top: 15px; border: 1px dashed #cbd5e1; width: 100%; padding: 10px; cursor: pointer; }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .page { box-shadow: none; border: none; margin: 0; width: 210mm; height: 296mm; }
            .bottom-container { margin-top: auto; padding-bottom: 10mm; }
            
            .item-row { border-bottom: 1px solid transparent !important; }
            .has-content { border-bottom: 1px solid #000 !important; }
            
            .input-field { border-bottom: 1px solid #000 !important; }
            textarea::placeholder { color: transparent !important; }
        }
    </style>
</head>
<body>

<div class="controls no-print">
    <button class="btn btn-mode active" id="coll-btn" onclick="setMode('collection')">Collection Note</button>
    <button class="btn btn-mode" id="ret-btn" onclick="setMode('return')">Return Note</button>
    <button class="btn btn-print" onclick="window.print()">PRINT / DOWNLOAD PDF</button>
</div>

<div class="page">
    <header>
        <h1 id="page-title">COLLECTION NOTE</h1>
        <div class="date-box" id="dateText">Date: --</div>
    </header>

    <div class="info-grid">
        <div class="info-item">
            <label>Customer Name</label>
            <input type="text" class="input-field" placeholder="Full name">
        </div>
        <div class="info-item">
            <label>Company</label>
            <div class="company-name" style="font-size: 14pt; font-weight: 900; padding: 6px 0;">Raduga Pte Ltd</div>
        </div>
    </div>

    <div class="info-item" style="margin-bottom: 20px;">
        <label>Address</label>
        <input type="text" class="input-field" placeholder="Enter address details">
    </div>

    <div class="item-section">
        <div class="section-title">ITEM LIST</div>
        
        <div class="item-header">
            <div>SKU / DESCRIPTION</div>
            <div>IMEI / SERIAL NO.</div>
        </div>
        <div id="itemBody">
            <div class="item-row">
                <textarea rows="1" placeholder="Type SKU..." oninput="handleInput(this)"></textarea>
                <textarea rows="1" placeholder="Type IMEI..." oninput="handleInput(this)"></textarea>
            </div>
        </div>
        <button class="btn-add no-print" onclick="addItem()">+ Add Item Row</button>
    </div>

    <div class="bottom-container">
        <div class="remark-section">
            <label style="font-size: 8.5pt; font-weight: 800;">REMARKS</label>
            <textarea class="remark-area" placeholder="Notes..."></textarea>
        </div>

        <div class="signature-grid">
            <div class="sig-box" id="sig-box-it">
                <div class="sig-space"></div>
                <div class="sig-label">Authorized IT Dept</div>
            </div>
            <div class="sig-box">
                <div class="sig-space"></div>
                <div class="sig-label" id="sig-label-text">Collected By</div>
            </div>
        </div>
    </div>
</div>

<script>
    function handleInput(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
        
        const row = el.closest('.item-row');
        const textareas = row.querySelectorAll('textarea');
        let hasValue = false;
        textareas.forEach(t => {
            if(t.value.trim() !== '') hasValue = true;
        });
        
        if(hasValue) row.classList.add('has-content');
        else row.classList.remove('has-content');
    }

    function setMode(mode) {
        const title = document.getElementById('page-title');
        const labelText = document.getElementById('sig-label-text');
        const itBox = document.getElementById('sig-box-it');
        
        document.getElementById('coll-btn').classList.toggle('active', mode === 'collection');
        document.getElementById('ret-btn').classList.toggle('active', mode === 'return');

        if (mode === 'collection') {
            title.innerText = 'COLLECTION NOTE';
            labelText.innerText = 'Collected By';
            itBox.style.visibility = 'visible';
        } else {
            title.innerText = 'RETURN NOTE';
            labelText.innerText = 'Customer Signature';
            itBox.style.visibility = 'hidden';
        }
    }

    function addItem() {
        const div = document.createElement('div');
        div.className = 'item-row';
        div.innerHTML = `
            <textarea rows="1" oninput="handleInput(this)"></textarea>
            <textarea rows="1" oninput="handleInput(this)"></textarea>
        `;
        document.getElementById('itemBody').appendChild(div);
    }

    document.getElementById('dateText').innerText = 'Date: ' + new Date().toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric'
    });
</script>
</body>
</html>
