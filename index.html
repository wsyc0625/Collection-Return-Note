<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raduga Note - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --line-color: #000; --text-main: #1a1a1a; --text-muted: #555; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        @page { size: A4; margin: 0; }

        body { 
            background: #f1f5f9; 
            margin: 0; padding: 10px 0; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
        }

        .page {
            background: white;
            width: 95%;
            max-width: 210mm;
            min-height: 296mm;
            padding: 15mm 12mm;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        header { 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 2.5px solid var(--line-color);
            padding-bottom: 8px;
        }
        h1 { margin: 0; font-size: 22pt; font-weight: 900; letter-spacing: 0.5px; }
        .date-box { font-size: 11pt; font-weight: bold; }

        .info-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        @media (min-width: 600px) {
            .info-grid { grid-template-columns: 1.2fr 0.8fr; gap: 40px; }
            .page { padding: 20mm 20mm; width: 210mm; }
        }

        .info-item { display: flex; flex-direction: column; }
        label { font-size: 8.5pt; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; color: var(--text-muted); }
        .input-field { border: none; font-size: 12pt; padding: 6px 0; outline: none; border-bottom: 1px solid #ddd; background: transparent; width: 100%; }

        /* Table */
        .item-section { margin-top: 10px; flex-grow: 1; }
        .item-header { 
            display: grid; grid-template-columns: 1fr 1fr; 
            font-weight: 800; font-size: 9.5pt; padding: 10px 5px; 
            background: #fcfcfc; border-top: 1.5px solid var(--line-color); border-bottom: 1px solid var(--line-color);
        }
        .item-row { 
            display: grid; grid-template-columns: 1fr 1fr; 
            padding: 10px 5px; align-items: start; border-bottom: 1px solid #f0f0f0;
        }
        .item-row textarea, .item-row input { border: none; outline: none; font-size: 11pt; background: transparent; width: 95%; font-family: inherit; }

        /* Bottom */
        .bottom-container { margin-top: 40px; }
        .remark-section { margin-bottom: 40px; }
        .remark-area { width: 100%; min-height: 70px; border: none; border-bottom: 1.5px solid var(--line-color); font-size: 12pt; padding: 35px 0 8px 0; outline: none; resize: none; background: transparent; display: block; }

        .footer-signatures { padding-bottom: 8mm; }
        .signature-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 600px) { .signature-grid { grid-template-columns: 1fr 1fr; gap: 60px; } }

        .sig-box { text-align: center; }
        .canvas-wrap { border-bottom: 1.8px solid var(--line-color); margin-bottom: 8px; height: 90px; position: relative; background: #fdfdfd; }
        canvas { width: 100%; height: 90px; touch-action: none; }
        .sig-img { display: none; width: 100%; height: 90px; object-fit: contain; }
        .sig-label { font-size: 10pt; font-weight: 800; text-transform: uppercase; }

        /* Controls */
        .controls { width: 95%; max-width: 210mm; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-mode { flex: 1; padding: 12px; background: #475569; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-mode.active { background: #000; }
        .btn-print { flex: 1.5; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-add { background: #fff; color: #64748b; font-size: 9pt; margin-top: 10px; border: 1px dashed #cbd5e1; width: 100%; padding: 10px; cursor: pointer; }
        .btn-clear { background: #fff; color: #94a3b8; font-size: 7pt; margin-top: 5px; border: 1px solid #e2e8f0; padding: 3px 8px; cursor: pointer; }

        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .page { box-shadow: none; border: none; margin: 0; width: 210mm; height: 296mm; padding: 15mm 20mm; }
            .bottom-container { margin-top: auto; }
            .item-row { border-bottom: 1px solid transparent !important; }
            .has-content { border-bottom: 1px solid #000 !important; }
            .input-field { border-bottom: 1px solid #000 !important; }
            canvas { display: none !important; }
            .sig-img { display: block !important; }
            input::placeholder, textarea::placeholder { color: transparent !important; }
        }
    </style>
</head>
<body>

<div class="controls no-print">
    <button class="btn-mode active" id="mode-coll" onclick="switchMode('collection')">Collection Note</button>
    <button class="btn-mode" id="mode-ret" onclick="switchMode('return')">Return Note</button>
    <button class="btn-print" onclick="prepareAndPrint()">PRINT / SAVE PDF</button>
</div>

<div class="page">
    <header>
        <h1 id="page-title">COLLECTION NOTE</h1>
        <div class="date-box" id="dateText">Date: --</div>
    </header>

    <div class="info-grid">
        <div class="info-item">
            <label>Customer Name</label>
            <input type="text" class="input-field" placeholder="Enter customer name">
        </div>
        <div class="info-item">
            <label>Company</label>
            <div class="company-name">Raduga Pte Ltd</div>
        </div>
    </div>

    <div class="info-item" style="margin-bottom: 25px;">
        <label>Address</label>
        <input type="text" class="input-field" placeholder="Enter address">
    </div>

    <div class="item-section">
        <div class="item-header">
            <div>SKU / DESCRIPTION</div>
            <div>IMEI / SERIAL NO.</div>
        </div>
        <div id="itemBody">
            <div class="item-row">
                <textarea rows="1" placeholder="Type SKU..." oninput="handleInput(this)"></textarea>
                <input type="text" placeholder="Type IMEI" oninput="handleInput(this)">
            </div>
        </div>
        <button class="btn-add no-print" onclick="addItem()">+ Add Item Row</button>
    </div>

    <div class="bottom-container">
        <div class="remark-section">
            <label style="font-size: 8.5pt; font-weight: 800;">REMARKS</label>
            <textarea class="remark-area" placeholder="Enter notes here..."></textarea>
        </div>

        <div class="footer-signatures">
            <div class="signature-grid" id="area-coll">
                <div class="sig-box">
                    <div class="canvas-wrap"><canvas id="sig-it"></canvas><img id="img-it" class="sig-img"></div>
                    <div class="sig-label">Authorized IT Dept</div>
                    <button class="btn-clear no-print" onclick="clearSig('sig-it')">Clear</button>
                </div>
                <div class="sig-box">
                    <div class="canvas-wrap"><canvas id="sig-driver"></canvas><img id="img-driver" class="sig-img"></div>
                    <div class="sig-label">Collected By</div>
                    <button class="btn-clear no-print" onclick="clearSig('sig-driver')">Clear</button>
                </div>
            </div>

            <div class="signature-grid" id="area-ret" style="display: none;">
                <div class="sig-box">
                    <div class="canvas-wrap"><canvas id="sig-cust"></canvas><img id="img-cust" class="sig-img"></div>
                    <div class="sig-label">Customer Signature</div>
                    <button class="btn-clear no-print" onclick="clearSig('sig-cust')">Clear</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentMode = 'collection';
    let rowCount = 1;
    const pads = {};

    function handleInput(el) {
        if(el.tagName === 'TEXTAREA') {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }
        const row = el.closest('.item-row');
        const hasValue = Array.from(row.querySelectorAll('textarea, input')).some(i => i.value.trim() !== '');
        hasValue ? row.classList.add('has-content') : row.classList.remove('has-content');
    }

    function resizeCanvas() {
        ['sig-it', 'sig-driver', 'sig-cust'].forEach(id => {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ratio = Math.max(window.devicePixelRatio || 1, 2);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            if (pads[id]) pads[id].clear();
        });
    }

    function initPads() {
        ['sig-it', 'sig-driver', 'sig-cust'].forEach(id => {
            pads[id] = new SignaturePad(document.getElementById(id), { penColor: "black" });
        });
        resizeCanvas();
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('page-title').innerText = mode.toUpperCase() + ' NOTE';
        document.getElementById('mode-coll').classList.toggle('active', mode === 'collection');
        document.getElementById('mode-ret').classList.toggle('active', mode === 'return');
        document.getElementById('area-coll').style.display = mode === 'collection' ? 'grid' : 'none';
        document.getElementById('area-ret').style.display = mode === 'return' ? 'grid' : 'none';
        setTimeout(resizeCanvas, 50);
    }

    function addItem() {
        if (rowCount < 15) {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = '<textarea rows="1" oninput="handleInput(this)"></textarea> <input type="text" oninput="handleInput(this)">';
            document.getElementById('itemBody').appendChild(div);
            rowCount++;
        }
    }

    function clearSig(id) { if(pads[id]) pads[id].clear(); }

    function prepareAndPrint() {
        const targets = currentMode === 'collection' ? ['sig-it', 'sig-driver'] : ['sig-cust'];
        targets.forEach(id => {
            if (pads[id] && !pads[id].isEmpty()) {
                document.getElementById(id.replace('sig-', 'img-')).src = pads[id].toDataURL();
            }
        });
        window.print();
    }

    document.getElementById('dateText').innerText = 'Date: ' + new Date().toLocaleDateString('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric'
    });

    window.onload = initPads;
    window.onresize = resizeCanvas;
</script>
</body>
</html>
